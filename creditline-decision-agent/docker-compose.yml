# Single Postgres engine, two databases, opposite trust models — exactly the
# separation the runfile sells. mimic_creditline is mutable and agent-facing;
# runfile_audit is append-only evidence the agent can't reach.
services:
  postgres:
    image: postgres:16
    container_name: creditline-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - creditline_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  creditline_pgdata:
