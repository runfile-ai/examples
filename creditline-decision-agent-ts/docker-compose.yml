# Single Postgres engine hosting the agent-facing mimic_creditline database.
# Reuses the shared local instance on :5433 (the same one the monitoring-agent
# example points at), so all builds can share one engine.
services:
  postgres:
    image: postgres:16
    container_name: creditline-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - creditline_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  creditline_pgdata:
